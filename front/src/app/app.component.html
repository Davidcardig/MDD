<mat-sidenav-container class="app-sidenav-container">

  <!-- ── Drawer mobile ── -->
  <mat-sidenav #sidenav mode="over" position="end" class="mobile-sidenav">
    <ng-container *ngIf="isLogged$ | async">
      <div class="sidenav-wrapper">
        <div class="sidenav-links">
          <button class="sidenav-link logout-link" (click)="logout(); sidenav.close()">
            <span>Se déconnecter</span>
          </button>
          <a class="sidenav-link"
             routerLink="/"
             routerLinkActive="active-link"
             [routerLinkActiveOptions]="{exact: true}"
             (click)="sidenav.close()">
            <span>Articles</span>
          </a>
          <a class="sidenav-link"
             routerLink="/themes"
             routerLinkActive="active-link"
             (click)="sidenav.close()">
            <span>Thèmes</span>
          </a>
        </div>

        <a class="sidenav-profile"
           routerLink="/profile"
           routerLinkActive="active-link"
           (click)="sidenav.close()">
          <mat-icon>account_circle</mat-icon>
        </a>
      </div>
    </ng-container>
  </mat-sidenav>

  <!-- ── Contenu principal ── -->
  <mat-sidenav-content>
    <app-navbar
      [class.hide-on-mobile]="isAuthPage"
      *ngIf="!(isHome && (isLogged$ | async) === false)"
      (menuToggle)="sidenav.toggle()">
    </app-navbar>
    <router-outlet></router-outlet>
  </mat-sidenav-content>

</mat-sidenav-container>
