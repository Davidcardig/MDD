<div class="themes-container">


  <div class="loading-container" *ngIf="loading">
    <mat-spinner diameter="50"></mat-spinner>
  </div>

  <div class="themes-grid" *ngIf="!loading">
    <mat-card class="theme-card" *ngFor="let theme of themes">
      <mat-card-header>
        <mat-card-title>{{ theme.title }}</mat-card-title>
      </mat-card-header>

      <mat-card-content>
        <p class="theme-description">{{ theme.description }}</p>
      </mat-card-content>

      <mat-card-actions>
        <button
          mat-raised-button
          color="primary"
          [disabled]="theme.subscribed"
          (click)="subscribe(theme)"
        >

          {{ theme.subscribed ? 'Déjà abonné' : "S'abonner" }}
        </button>
      </mat-card-actions>
    </mat-card>

    <p class="empty-message" *ngIf="themes.length === 0">
      Aucun thème disponible pour le moment.
    </p>
  </div>

</div>
