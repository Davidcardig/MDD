# ??????????????????????????????????????????????????????????????????????????????
# Profil TEST ? surcharge application.properties de production
# Base H2 in-memory : aucune donnÈe ne persiste entre les lancements de tests
# ??????????????????????????????????????????????????????????????????????????????

# DÈsactivation de l'import du .env (inutile en test)
spring.config.import=

# Base H2 in-memory
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate : recrÈation du schÈma ‡ chaque dÈmarrage du contexte de test
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=false

# JWT (valeurs fixes en test ? pas de variable d'env requise)
jwt.secret=test-secret-key-for-unit-and-integration-tests-only-32chars
jwt.expiration=86400000

# RÈduction du bruit dans les logs de test
logging.level.org.springframework.security=WARN
logging.level.com.openclassrooms.mddapi=WARN
logging.level.org.hibernate=WARN

